name: build

on:
  push:
    branches: [main]
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
          - os: darwin
            arch: arm64
          - os: darwin
            arch: amd64
          - os: linux
            arch: arm64
          - os: linux
            arch: amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
      - name: Build
        run: |
          ext=""
          [ "${{ matrix.os }}" = "windows" ] && ext=".exe"
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o "codeye${ext}" ./cmd/codeye
          mkdir -p dist
          mv "codeye${ext}" "dist/codeye-${{ matrix.os }}-${{ matrix.arch }}${ext}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeye-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "codeye-*"
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            codeye-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
